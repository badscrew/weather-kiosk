<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title data-i18n="appTitle">Weather Kiosk</title>

  <!-- PWA manifest. When installed (Add to Home Screen on iOS, Install
       on Android/desktop), the app launches without browser chrome. This
       is the only way to get a true full-screen experience on iPhone
       Safari, which does not implement the Fullscreen API. -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b1220" />

  <!-- iOS standalone mode hints. Required so an Add-to-Home-Screen icon
       launches without the Safari address bar / tab strip. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Weather" />
  <link rel="apple-touch-icon" href="icons/sun.svg" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="stage">
    <div id="app">
    <!-- Header -->
    <header class="topbar">
      <button class="loc-block" id="location-btn" type="button" aria-haspopup="dialog" aria-controls="loc-dialog">
        <div class="location">
          <span id="location">--</span><span class="location-local" id="location-local" hidden></span>
        </div>
        <div class="location-sub" id="location-sub"></div>
      </button>
      <div class="clock">
        <div class="time" id="time">--:--</div>
      </div>
      <div class="date-block">
        <div class="date" id="date">--</div>
      </div>
    </header>

    <!-- Main content: today + 3-day forecast -->
    <section class="content">
      <!-- Today panel -->
      <div class="today" id="today" role="button" tabindex="0"
        data-i18n-attr="aria-label" data-i18n-attr-key="todayToggleAria"
        aria-label="Tap to switch between summary and 3-hour detail">
        <a class="alert-chip" id="today-alert" hidden></a>
        <div class="today-icon" id="today-icon">--</div>
        <div class="today-temp">
          <span class="temp-value" id="today-temp">--</span><span class="temp-unit">°</span>
          <div class="today-feels" id="today-feels">--°</div>
        </div>
        <div class="today-condline">
          <div class="today-cond" id="today-cond">--</div>
          <div class="today-hilo">
            <span><span data-i18n="hiAbbr">H</span> <b id="today-high">--</b>°</span>
            <span><span data-i18n="loAbbr">L</span> <b id="today-low">--</b>°</span>
          </div>
        </div>
        <div class="today-meta">
          <div class="meta-row">
            <span class="meta-label" id="today-moon-icon">🌑</span>
            <span class="meta-value" id="today-moon">--</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">
              <img class="meta-icon" src="icons/wind.svg" alt="Wind"
                data-i18n-attr="alt" data-i18n-attr-key="wind" />
            </span>
            <span class="meta-value" id="today-wind">--</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">
              <img class="meta-icon" src="icons/droplet.svg" alt="Humidity"
                data-i18n-attr="alt" data-i18n-attr-key="humidity" />
            </span>
            <span class="meta-value" id="today-humidity">--%</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">
              <img class="meta-icon" src="icons/umbrella.svg" alt="Rain"
                data-i18n-attr="alt" data-i18n-attr-key="rain" />
            </span>
            <span class="meta-value" id="today-precip">--%</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">
              <img class="meta-icon" src="icons/sunrise.svg" alt="Sunrise"
                data-i18n-attr="alt" data-i18n-attr-key="sunrise" />
            </span>
            <span class="meta-value" id="today-sunrise">--:--</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">
              <img class="meta-icon" src="icons/sunset.svg" alt="Sunset"
                data-i18n-attr="alt" data-i18n-attr-key="sunset" />
            </span>
            <span class="meta-value" id="today-sunset">--:--</span>
          </div>
        </div>
      </div>

      <!-- 3-day / week forecast (tap to toggle) -->
      <div class="forecast" id="forecast" role="button" tabindex="0"
        data-i18n-attr="aria-label" data-i18n-attr-key="forecastToggleAria"
        aria-label="Tap to switch between 3-day and weekly forecast">
        <!-- Cards injected by JS -->
      </div>
    </section>

    <!-- 15-minute precipitation strip (next 4 hours) -->
    <div class="precip-strip" id="precip-strip" data-i18n-attr="aria-label" data-i18n-attr-key="precipAria" aria-label="Precipitation probability for the next 4 hours">
      <div class="precip-title">
        <img class="precip-title-icon" src="icons/umbrella.svg" alt="" />
        <span data-i18n="precipTitleShort">next 4 hours</span>
      </div>
      <div class="precip-track" id="precip-track"></div>
      <div class="precip-axis" id="precip-axis"></div>
    </div>

    <!-- Footer status -->
    <footer class="statusbar">
      <span id="status" data-i18n="loading">Loading…</span>
      <span id="updated"></span>
    </footer>

    <!-- Data attribution. Kept tiny and subtle; hidden while an error
         banner is showing in the same corner area. -->
    <div class="credits" aria-label="Data sources">
      <span>Data:</span>
      <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a>
      <span aria-hidden="true">·</span>
      <a href="https://www.bigdatacloud.com/" target="_blank" rel="noopener">BigDataCloud</a>
      <span aria-hidden="true">·</span>
      <a href="https://meteofrance.com/" target="_blank" rel="noopener">Météo-France</a>
    </div>
    </div>
  </main>

  <!-- Fullscreen toggle. Hidden by default; JS reveals it only on devices
       where the Fullscreen API actually works (Android, desktop). On
       iPhone Safari it stays hidden because the API is not implemented;
       users get full screen by installing the PWA instead. -->
  <button class="fullscreen-btn" id="fullscreen-btn" type="button" hidden
    data-i18n-attr="aria-label" data-i18n-attr-key="fullscreenAria"
    aria-label="Toggle fullscreen">
    <img class="fs-icon-enter" src="icons/fullscreen-enter.svg" alt="" />
    <img class="fs-icon-exit" src="icons/fullscreen-exit.svg" alt="" />
  </button>

  <script src="config.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>

  <!-- Location picker dialog -->
  <div class="modal-backdrop" id="loc-dialog" role="dialog" aria-modal="true" aria-labelledby="loc-dialog-title" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 id="loc-dialog-title" data-i18n="dialogTitle">Choose location</h2>
        <button class="modal-close" id="loc-close" type="button" data-i18n-attr="aria-label" data-i18n-attr-key="closeAria" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <button type="button" class="loc-gps-btn" id="loc-gps">
          <span class="loc-gps-icon" aria-hidden="true">📍</span>
          <span data-i18n="useMyLocation">Use my location</span>
        </button>
        <div class="loc-divider"><span data-i18n="orPickCity">or pick a city</span></div>
        <label class="field">
          <span data-i18n="language">Language</span>
          <select id="loc-language">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="de">Deutsch</option>
            <option value="zh">中文</option>
            <option value="hi">हिन्दी</option>
            <option value="ar">العربية</option>
            <option value="bn">বাংলা</option>
            <option value="pt">Português</option>
            <option value="ru">Русский</option>
            <option value="it">Italiano</option>
            <option value="ur">اردو</option>
            <option value="id">Bahasa Indonesia</option>
            <option value="ja">日本語</option>
          </select>
        </label>
        <label class="field">
          <span data-i18n="country">Country</span>
          <select id="loc-country"></select>
        </label>
        <label class="field">
          <span data-i18n="city">City</span>
          <input id="loc-city" type="search" autocomplete="off" data-i18n-attr="placeholder" data-i18n-attr-key="cityPlaceholder" placeholder="Type at least 2 letters…" />
        </label>
        <ul class="loc-results" id="loc-results"></ul>
        <div class="loc-hint" id="loc-hint" data-i18n="hintPick">Pick a country, then search for a city.</div>
      </div>
    </div>
  </div>
</body>
</html>
